version: '2'
sql:
- engine: postgresql
  schema: postgresql/schema.sql
  queries: postgresql/query.sql
  gen:
    go:
      package: dynamicquery
      out: postgresql
- engine: postgresql
  schema: pgx/schema.sql
  queries: pgx/query.sql
  gen:
    go:
      package: dynamicquerypgx
      sql_package: pgx/v5
      out: pgx
